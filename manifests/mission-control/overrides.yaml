# grafana — Dashboard UI (optional in upstream values; enabled for this lab).
# Port-forward svc/mission-control-grafana:3000:80 — see docs/05-observability.md.
# Pinned values.yaml keeps grafana.enabled: false; datasources (Mimir, Loki) come from the chart.
grafana:
  enabled: true
  nodeSelector:
    mission-control.datastax.com/role: platform