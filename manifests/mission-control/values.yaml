        - name: mimir-tls
          mountPath: /tmp/certs/mimir
          readOnly: true
        - name: loki-tls
          mountPath: /tmp/certs/loki
          readOnly: true
        - name: grafana-tls
          mountPath: /tmp/certs/grafana
          readOnly: true
