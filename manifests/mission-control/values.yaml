global:
  clusterScoped: true
  # -- Labels to be added to all deployed resources.
  commonLabels: {}
  # -- Annotations to be added to all deployed resources.
  commonAnnotations: {}
  # -- If true, the helm chart will generate ClusterRoles and ClusterRoleBindings.
  # Set to false to give Mission Control up-front, more restricted permissions.
  clusterScopedResources: true
  # -- ImageConfig allows to set default values for all the container images used by Mission Control.
  imageConfig:
    images:
      cql-router:
        registry: "proxy.replicated.com"
        repository: "proxy/mission-control/559669398656.dkr.ecr.us-west-2.amazonaws.com/mission-control"
        name: "cql-router"
        tag: "ed96e7c4"
      cqlsh:
        registry: "proxy.replicated.com"
        repository: "proxy/mission-control/559669398656.dkr.ecr.us-west-2.amazonaws.com/mission-control"
        name: "cqlsh-pod"
        tag: "d6dcf587"
      data-api:
        repository: "stargateio"
        name: "data-api"
        tag: "v1.0.40"
      k8ssandra-client:
        repository: "k8ssandra"
        name: "k8ssandra-client"
        tag: "v0.8.10"
      medusa:
        repository: "k8ssandra"
        name: "medusa"
        tag: "0.27.1"
    defaults:
      pullSecrets:
        - "{{ .Release.Name}}-registry"
    types:
      hcd:
        registry: "proxy.replicated.com"
        repository: "proxy/mission-control/559669398656.dkr.ecr.us-west-2.amazonaws.com/engops-shared/hcd/prod"
        name: "hcd"
        suffix: "-ubi"
  replicated:
    channelName: Stable
    customerEmail: michel.deru@ibm.com
    customerName: IBM - Michel De Ru
    dockerconfigjson: 
    licenseFields:
      expires_at:
        name: expires_at
        title: Expiration
        description: License Expiration
        value: ""
        valueType: String
        signature:
          v1: 
    licenseID: 39swrs6vpjYuVafSOMc9QPZTNCR
    licenseType: dev
# -- A name in place of the chart name which is used in the metadata.name of
# objects created by this chart.
nameOverride: ""
# -- A name in place of the value used for metadata.name in objects created by
# this chart. The default value has the form releaseName-chartName.
fullnameOverride: ""
# -- Labels to be added to all deployed resources.
commonLabels: {}
# -- Sets the number of mission-control-operator pods.
replicaCount: 1
# -- Determines if the mission-control-operator should be installed as the control plane
# or if it's simply in a secondary cluster waiting to be promoted
controlPlane: true
disableCertManagerCheck: true
disablePullSecretsGeneration: false
# --
tls:
  # -- Generate the root CA used to derive TLS Certificates for various components of Mission Control, except webhooks and certs related to DBs themselves.
  # Certificate generation is unconditional and happens always. In effect, TLS is mandatory and cannot be disabled.
  generateCa: true
  # -- Allows deriving the Certificates Mission Control generates from an already existing CA.
  rootCaSecretName: "mission-control-platform-ca"
  certDuration: 8760h # 365 days
  certRenewBefore: 336h # 14 days before expiry
# Sets properties for the mission-control-operator container
image:
  # -- Container registry containing the repository where the image resides
  registry: docker.io
  # -- Docker repository for mission-control-operator
  repository: datastax/mission-control
  # -- Pull policy for the operator container
  pullPolicy: IfNotPresent
  # -- Tag of the mission-control-operator image to pull from image.repository
  tag: v1.18.0
# -- References to secrets to use when pulling images. See:
# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
# imagePullSecret: secretName

ingress:
  #-- Automates configuring ingress for all services within Mission Control
  enabled: false
  #-- Region domain to use for the ingress.
  regionDomain: ""
  #-- Wildcard domain to use for the ingress.
  wildcardDomain: ""
serviceAccount:
  # -- Annotations to add to the service account.
  annotations: {}
# -- Annotations for the mission-control-operator pod.
podAnnotations: {}
# -- PodSecurityContext for the mission-control-operator pod. See:
# https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext:
  runAsNonRoot: true
securityContext:
  # -- Restrict privilege escalation for the mission-control-operator container.
  allowPrivilegeEscalation: false
  # -- Run mission-control-operator container as non-root user
  runAsNonRoot: true
  # -- Group for the user running the mission-control-operator container / process
  runAsGroup: 65534
  # -- User for running the mission-control-operator container / process
  runAsUser: 65534
  # -- Run mission-control-operator container having read-only root file system permissions.
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
# -- Resources requests and limits for the mission-control-operator pod. We usually
# recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments
# with little resources, such as Minikube. If you want to specify resources, add
# `requests` and `limits` for `cpu` and `memory` while removing the existing
# `{}`
resources: {}
# -- Node labels for operator pod assignment.
# Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
#
nodeSelector: {}
# -- Node tolerations for server scheduling to nodes with taints.
# Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
#
tolerations: []
# -- Node affinity for operator pod assignment.
allowOperatorsOnDatabaseNodes: true
alerting: {}
# -- CustomRules managed in this Helm release.
#  customRules: |
#    - alert: my-custom-alert-rule
#      annotations:
#        context: "More information about the alert"
#        description: test alert description
#        summary: test alert summary
#      expr: org_apache_cassandra_metrics_table_memtable_on_heap_data_size_all > 100000000
#      for: 1m
#      labels:
#        group: ""
#        severity: warning

client:
  # -- Automatically handle CRD upgrades
  manageCrds: true
  image:
    # -- Container registry containing the repository where the image resides
    registry: docker.io
    # -- Docker repository for k8ssandra-client
    repository: k8ssandra/k8ssandra-client
    # -- Pull policy for the operator container
    pullPolicy: IfNotPresent
    # -- Tag of the k8ssandra-client image to pull from image.repository
    tag: mission-control-1.18.0
  # -- HTTPS proxy address to use for communication to helm.k8ssandra.io
  #proxy:
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
  # -- Resources requests and limits for the crd-upgrader pod. We usually
  # recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments
  # with little resources, such as Minikube. If you want to specify resources, add
  # `requests` and `limits` for `cpu` and `memory` while removing the existing
  # `{}`
  resources: {}
  # -- Node labels for crd-upgrader pod assignment.
  # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}
  # -- Node tolerations for server scheduling to nodes with taints.
  # Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
  tolerations: []
ui:
  enabled: true
  # -- Base URL that client browsers will use to access the UI.
  # If Dex only uses static passwords and/or the LDAP connector, this can be left empty, and the UI will work via any
  # routable URL.
  # If Dex uses an external provider (e.g. OIDC), this must be set, and the UI can only be accessed via this canonical
  # URL.
  baseUrl: ''
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
  image:
    # -- Image registry for the ui
    registry: docker.io
    # -- Image repository for the ui
    repository: datastax/mission-control-ui
    # -- Tag of the client image to pull from
    tag: v1.18.0
    # -- Pull policy for the client container
    pullPolicy: IfNotPresent
  service:
    nodePort: 30880
  # URL of a Prometheus-like system to read metrics from
  # --- Embedded mode for Mission Control UI disables certain endpoints in the rest-api that are not desirable
  # when running as a part of watsonx.data
  embeddedMode:
    enabled: false
  # -- Resources requests and limits for the mission-control-ui pod. We usually
  # recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments
  # with little resources, such as Minikube. If you want to specify resources, add
  # `requests` and `limits` for `cpu` and `memory` while removing the existing
  # `{}`
  resources: {}
  # -- Node labels for ui pod assignment.
  # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
  nodeSelector: {}
  # -- Node tolerations for server scheduling to nodes with taints.
  # Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/
  tolerations: []
  # -- Configure UI / restapi related settings for Mimir, such as rules
  customVolumeMounts:
    - name: loki-tls-cert
      mountPath: /tmp/certs/loki
  customVolumes:
    - name: loki-tls-cert
      secret:
        secretName: loki-tls
dex:
  image:
    repository: docker.io/datastax/mission-control-dex
    tag: v1.18.0
  configSecret:
    name: mission-control-ui-dex-config # We can't give dynamic naming here due to the way the dex chart works
    create: false
  https:
    enabled: true
  config:
    issuer: https://{{ .Release.Name }}-dex:5554/dex
    storage:
      type: kubernetes
      config:
        inCluster: true
    web:
      https: 0.0.0.0:5554
      tlsCert: /etc/dex/tls/tls.crt
      tlsKey: /etc/dex/tls/tls.key
    telemetry:
      http: 127.0.0.1:5558
    grpc:
      addr: 127.0.0.1:5557
    staticClients:
      - id: mission-control-ui
        redirectURIs:
          - '/v1/auth/callback'
        name: 'Mission Control GUI'
        secret: ZXhhbXBsZS1hcHAtc2VjcmV0
    frontend:
      issuer: Mission Control
    # --- Test settings, generates test admin user - not for production ever!!
    enablePasswordDB: false
  service:
    type: ClusterIP
    ports:
      http:
        port: 5556
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
  volumes:
    - name: tmp-dir
      emptyDir: {}
    - name: tls-certs
      secret:
        secretName: mission-control-dex-tls # TODO: document that if tls, but not genCert, user needs to set this
        defaultMode: 420
  volumeMounts:
    - name: tmp-dir
      mountPath: /tmp
      readOnly: false
    - mountPath: /etc/dex/tls
      name: tls-certs
      readOnly: true
  commonLabels:
    missioncontrol.datastax.com/component: dex
agent:
  enabled: false
  role: Agent
  persistence:
    enabled: false
    hostPath:
      enabled: false
  customConfig:
    data_dir: /vector-data-dir
    api:
      enabled: true
      address: 127.0.0.1:8686
      playground: false
aggregator:
  enabled: true
  persistence:
    enabled: true
  podValuesChecksumAnnotation: true
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
  serviceHeadless:
    enabled: false
  service:
    type: ClusterIP
    ports:
      - name: vector
        protocol: TCP
        port: 6000
        targetPort: 6000
  extraVolumes:
    - name: aggregator-tls-cert
      secret:
        secretName: mission-control-aggregator-tls-server
    - name: loki-tls-cert
      secret:
        secretName: loki-tls
    - name: mimir-tls-cert
      secret:
        secretName: mimir-tls
        defaultMode: 420
  extraVolumeMounts:
    - name: aggregator-tls-cert
      mountPath: /tmp/certs/aggregator
    - name: loki-tls-cert
      mountPath: /tmp/certs/loki
    - name: mimir-tls-cert
      mountPath: /tmp/certs/mimir
      readOnly: true
  customConfig:
    data_dir: /vector-data-dir
    api:
      enabled: true
      address: 127.0.0.1:8686
      playground: false
    sources:
      internal_metrics:
        type: internal_metrics
      statsd:
        address: 0.0.0.0:8125
        mode: tcp
        type: statsd
      syslog:
        address: 0.0.0.0:9000
        mode: tcp
        type: syslog
      vector:
        address: 0.0.0.0:6000
        type: vector
        version: "2"
        tls:
          enabled: true
          ca_file: "/tmp/certs/aggregator/ca.crt"
          crt_file: "/tmp/certs/aggregator/tls.crt"
          key_file: "/tmp/certs/aggregator/tls.key"
          verify_certificate: true
          verify_hostname: false
      prometheus_push:
        type: prometheus_remote_write
        expire_metrics_secs: 3600
        address: 0.0.0.0:9090
      kube_state_metrics:
        type: prometheus_scrape
        endpoints:
          - "http://{{ .relName }}-kube-state-metrics:8080/metrics"
      mimir-self-monitoring:
        type: prometheus_scrape
        tls:
          crt_file: /tmp/certs/mimir/tls.crt
          key_file: /tmp/certs/mimir/tls.key
          verify_certificate: false
          server_name: mission-control-mimir
        endpoints:
          - https://{{ .relName }}-mimir-alertmanager:8080/metrics
          - https://{{ .relName }}-mimir-compactor:8080/metrics
          - https://{{ .relName }}-mimir-distributor:8080/metrics
          - https://{{ .relName }}-mimir-ingester:8080/metrics
          - https://{{ .relName }}-mimir-querier:8080/metrics
          - https://{{ .relName }}-mimir-ruler:8080/metrics
          - https://{{ .relName }}-mimir-query-frontend:8080/metrics
          - https://{{ .relName }}-mimir-query-scheduler:8080/metrics
          - https://{{ .relName }}-mimir-store-gateway:8080/metrics
    transforms:
      # Ensure that all fields we are using as Loki labels have defaults. We are dealing with two log sources:
      # - DSE logs (see `ConfigureVectorForDseDatacenter` in `pkg/k8ssandrautils/k8ssandra_cluster.go`)
      # - Kubernetes logs (see `kubernetes_logs` source in the Vector agent config)
      vector_with_defaults:
        type: remap
        inputs: ["vector"]
        source: |-
          if !exists(.namespace) {
            if exists(.kubernetes.pod_namespace) {
              .namespace = del(.kubernetes.pod_namespace)
            } else {
              .namespace = "unknown"
            }
          }
          if !exists(.pod_name) {
            if exists(.kubernetes.pod_name) {
              .pod_name = del(.kubernetes.pod_name)
            } else {
              .pod_name = "unknown"
            }
          }
          if !exists(.container_name) {
            if exists(.kubernetes.container_name) {
              .container_name = del(.kubernetes.container_name)
            } else {
              .container_name = "unknown"
            }
          }
          if !exists(.file) { .file = "unknown" }
          if !exists(.cluster) { .cluster = "unknown" }
          if !exists(.datacenter) { .datacenter = "unknown" }
          if !exists(.rack) { .rack = "unknown" }
    sinks:
      mimir:
        type: "prometheus_remote_write"
        tls:
          crt_file: /tmp/certs/mimir/tls.crt
          key_file: /tmp/certs/mimir/tls.key
          verify_certificate: false
          server_name: mission-control-mimir
        inputs: ["vector", "internal_metrics", "kube_state_metrics", "mimir-self-monitoring", "prometheus_push", "statsd"]
        endpoint: "https://{{ .relName }}-mimir-gateway:443/api/v1/push"
        expire_metrics_secs: 3600
        # disabling health check (which is a GET) because Mimir is not accepting GETs
        healthcheck:
          enabled: false
        request:
          retry_attempts: 1
      loki:
        type: loki
        inputs: [vector_with_defaults, syslog]
        endpoint: "https://loki-gateway"
        tenant_id: anonymous
        out_of_order_action: accept
        request:
          retry_attempts: 1
        labels:
          source_type: |-
            {{ print "{{ source_type }}" }}
          namespace: |-
            {{ print "{{ namespace }}" }}
          pod_name: |-
            {{ print "{{ pod_name }}" }}
          file: |-
            {{ print "{{ file }}" }}
          cluster: |-
            {{ print "{{ cluster }}" }}
          datacenter: |-
            {{ print "{{ datacenter }}" }}
          rack: |-
            {{ print "{{ rack }}" }}
          container_name: |-
            {{ print "{{ container_name }}" }}
        encoding:
          codec: json
        tls:
          ca_file: /tmp/certs/loki/ca.crt
          server_name: "loki-gateway"
          verify_hostname: true
loki:
  enabled: true
  image:
    tag: 3.5.12
  strategy: "scalable"
  rbac:
    namespaced: true
    # Set to true in OpenShift to use SecurityContextConstraints
    sccEnabled: false
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    runAsUser: 10001
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  # Enable the following when running on openshift
  #global:
  #  clusterDomain: cluster.local
  #  dnsNamespace: openshift-dns
  #  dnsService: dns-default
  loki:
    analytics:
      reporting_enabled: false
    commonConfig:
      replication_factor: 1
    rulerConfig:
      storage:
        type: local
        local:
          directory: "/var/loki/rules"
    storage:
      bucketNames:
        chunks: loki-chunks
      type: s3
    compactor:
      retention_enabled: true
      working_directory: '/var/loki/retention'
    limits_config:
      retention_period: 7d
    schemaConfig:
      configs:
        - from: 2025-06-13
          object_store: # Specify the object store to use for the schema config. Either s3, azure or gcs.
          store: tsdb
          schema: v13
          index:
            period: 24h
            prefix: mc_loki_
    podSecurityContext:
      runAsNonRoot: true
    readinessProbe:
      httpGet:
        scheme: HTTPS
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    structuredConfig:
      server:
        log_level: debug
        http_tls_config:
          cert_file: /tmp/certs/loki/tls.crt
          key_file: /tmp/certs/loki/tls.key
          client_auth_type: NoClientCert
        grpc_tls_config:
          cert_file: /tmp/certs/loki/tls.crt
          key_file: /tmp/certs/loki/tls.key
          client_auth_type: NoClientCert
  gateway:
    image:
      tag: 1.29-alpine3.22-slim
    extraVolumeMounts:
      - name: loki-tls-cert
        mountPath: /tmp/certs/loki
    extraVolumes:
      - name: loki-tls-cert
        secret:
          secretName: loki-tls
    service:
      port: 443
    readinessProbe:
      httpGet:
        scheme: HTTPS
    nginxConfig:
      schema: https
      ssl: true
      serverSnippet: |
        ssl_certificate /tmp/certs/loki/tls.crt;
        ssl_certificate_key /tmp/certs/loki/tls.key;
        proxy_ssl_trusted_certificate /tmp/certs/loki/ca.crt;
  resultsCache:
    enabled: false
  chunksCache:
    enabled: false
  read:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""
    replicas: 1
    extraVolumeMounts:
      - name: loki-tls-cert
        mountPath: /tmp/certs/loki
    extraVolumes:
      - name: loki-tls-cert
        secret:
          secretName: loki-tls
    extraArgs:
      - -boltdb.shipper.index-gateway-client.grpc.tls-enabled=true
      - -boltdb.shipper.index-gateway-client.grpc.tls-ca-path=/tmp/certs/loki/ca.crt
      - -boltdb.shipper.index-gateway-client.grpc.tls-server-name=loki-gateway
      - -compactor.grpc-client.tls-enabled=true
      - -compactor.grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -compactor.grpc-client.tls-server-name=loki-gateway
      - -frontend.grpc-client-config.tls-enabled=true
      - -frontend.grpc-client-config.tls-ca-path=/tmp/certs/loki/ca.crt
      - -frontend.grpc-client-config.tls-server-name=loki-gateway
      - -ingester.client.tls-enabled=true
      - -ingester.client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ingester.client.tls-server-name=loki-gateway
      - -querier.frontend-grpc-client.tls-enabled=true
      - -querier.frontend-grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -querier.frontend-grpc-client.tls-server-name=loki-gateway
      - -querier.scheduler-grpc-client.tls-enabled=true
      - -querier.scheduler-grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -querier.scheduler-grpc-client.tls-server-name=loki-gateway
      - -query-scheduler.grpc-client-config.tls-enabled=true
      - -query-scheduler.grpc-client-config.tls-ca-path=/tmp/certs/loki/ca.crt
      - -query-scheduler.grpc-client-config.tls-server-name=loki-gateway
      - -ruler.client.tls-enabled=true
      - -ruler.client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ruler.client.tls-server-name=loki-gateway
      - -tsdb.shipper.index-gateway-client.grpc.tls-enabled=true
      - -tsdb.shipper.index-gateway-client.grpc.tls-ca-path=/tmp/certs/loki/ca.crt
      - -tsdb.shipper.index-gateway-client.grpc.tls-server-name=loki-gateway
  write:
    persistence:
      enabled: true
      size: 10Gi
      storageClassName: ""
    replicas: 1
    extraVolumeMounts:
      - name: loki-tls-cert
        mountPath: /tmp/certs/loki
    extraVolumes:
      - name: loki-tls-cert
        secret:
          secretName: loki-tls
    extraArgs:
      - -boltdb.shipper.index-gateway-client.grpc.tls-enabled=true
      - -boltdb.shipper.index-gateway-client.grpc.tls-ca-path=/tmp/certs/loki/ca.crt
      - -boltdb.shipper.index-gateway-client.grpc.tls-server-name=loki-gateway
      - -compactor.grpc-client.tls-enabled=true
      - -compactor.grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -compactor.grpc-client.tls-server-name=loki-gateway
      - -frontend.grpc-client-config.tls-enabled=true
      - -frontend.grpc-client-config.tls-ca-path=/tmp/certs/loki/ca.crt
      - -frontend.grpc-client-config.tls-server-name=loki-gateway
      - -ingester.client.tls-enabled=true
      - -ingester.client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ingester.client.tls-server-name=loki-gateway
      - -querier.frontend-grpc-client.tls-enabled=true
      - -querier.frontend-grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ingester.client.tls-server-name=loki-gateway
      - -querier.scheduler-grpc-client.tls-enabled=true
      - -querier.scheduler-grpc-client.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ingester.client.tls-server-name=loki-gateway
      - -query-scheduler.grpc-client-config.tls-enabled=true
      - -query-scheduler.grpc-client-config.tls-ca-path=/tmp/certs/loki/ca.crt
      - -ingester.client.tls-server-name=loki-gateway
