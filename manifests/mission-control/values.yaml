      enabled: true
      reloadURL: "https://localhost:3000/api/admin/provisioning/dashboards/reload"
      env:
        REQUESTS_CA_BUNDLE: /tmp/certs/grafana/ca.crt
      extraMounts:
        - name: grafana-tls
          mountPath: /tmp/certs/grafana
          readOnly: true
    image:
      registry: docker.io
      # -- The Docker registry and image for the k8s sidecar
      repository: kiwigrid/k8s-sidecar
      # -- Docker image tag
      tag: 2.5.4
  initChownData:
    enabled: false
  grafana.ini:
    analytics:
      reporting_enabled: false
      check_for_updates: false
    server:
      # root_url: https://localhost:3000
      cert_key: /etc/grafana/ssl/tls.key
      cert_file: /etc/grafana/ssl/tls.crt
      protocol: https
  plugins:
    - grafana-polystat-panel
  readinessProbe:
    httpGet:
      scheme: HTTPS
  livenessProbe:
    httpGet:
      scheme: HTTPS
  extraSecretMounts:
    - name: loki-tls
      mountPath: /tmp/certs/loki
      secretName: loki-tls
      readOnly: true
    - name: grafana-tls
      mountPath: /etc/grafana/ssl
      secretName: grafana-tls
      readOnly: true
    - name: mimir-tls
      mountPath: /tmp/certs/mimir
      secretName: mimir-tls
      readOnly: true
